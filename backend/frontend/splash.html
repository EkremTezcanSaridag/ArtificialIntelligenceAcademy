<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Garanti Arşivi OCR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <style>
        :root {
            --primary: hsl(210, 70%, 55%);
            --bg-gradient: linear-gradient(135deg, hsl(210, 30%, 15%), hsl(210, 25%, 10%));
            --text: hsl(0, 0%, 95%);
        }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .logo {
            font-size: 3rem;
            font-weight: 800;
            background: var(--primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeIn 1.5s ease-out forwards;
        }
        .subtitle {
            margin-top: 1rem;
            font-size: 1.2rem;
            opacity: 0;
            animation: fadeIn 2s ease-out forwards 0.5s;
        }
        .spinner {
            margin-top: 2rem;
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="content" style="text-align:center; transform: translateY(20px); opacity:0;">
        <div class="logo">Garanti Arşivi OCR</div>
        <div class="subtitle">Belgenizi analiz ediyoruz, lütfen bekleyin...</div>
        <div class="spinner"></div>
    </div>
    <script>
        // Show splash for 2 seconds then go to main page
        setTimeout(() => {
            window.location.href = '/home';
        }, 2000);
    </script>
</body>
</html>
